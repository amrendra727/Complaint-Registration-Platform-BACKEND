<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-red: #ff3b3b;
            --accent-green: #39ff14;
            --accent-blue: #00d2ff;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main); 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-8 flex flex-col gap-10 max-w-6xl mx-auto w-full relative">
    <div class="fixed inset-0 z-[-1] opacity-10 pointer-events-none">
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-red-600 rounded-full blur-[150px]"></div>
        <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-blue-600 rounded-full blur-[150px]"></div>
    </div>

    <header class="glass-panel p-8 flex justify-between items-center border-white/5">
        <div class="flex items-center gap-8">
            <div class="w-16 h-16 glass-btn flex items-center justify-center text-[var(--accent-red)] shadow-[0_0_15px_rgba(255,59,59,0.2)]">
                <i class="fa-solid fa-server text-3xl"></i>
            </div>
            <div>
                <h1 class="font-black text-4xl text-white tracking-tighter uppercase glow-text">SIGNAL <span class="text-[var(--accent-red)]">ARCHIVE</span></h1>
                <p class="text-[10px] text-white/40 font-black tracking-[0.4em] uppercase mt-2">Deep Storage Retrieval Active</p>
            </div>
        </div>
        
        <div class="flex gap-8">
            <button onclick="fetchHistory()" class="glass-btn px-10 py-5 text-[10px] font-black tracking-widest text-[var(--accent-blue)] flex items-center gap-4 uppercase hover:shadow-[0_0_20px_rgba(0,210,255,0.3)] transition-all">
                <i class="fa-solid fa-sync-alt"></i> Sync
            </button>
            <button onclick="exportToCSV()" class="glass-btn px-10 py-5 text-[10px] font-black tracking-widest text-white flex items-center gap-4 uppercase">
                <i class="fa-solid fa-file-export"></i> Export
            </button>
            <a href="dashboard.html" class="glass-btn px-10 py-5 text-[10px] font-black tracking-widest text-[var(--accent-red)] flex items-center gap-4 uppercase transition-all">
                <i class="fa-solid fa-arrow-left"></i> Hub
            </a>
        </div>
    </header>

    <div class="glass-panel flex-1 flex flex-col overflow-hidden mb-12 border-white/5">
        <div class="overflow-x-auto flex-1 m-10 rounded-[2rem]">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="text-[10px] uppercase tracking-[0.4em] text-white/30 font-black border-b border-white/5">
                        <th class="p-10">Beacon ID</th>
                        <th class="p-10">Identity</th>
                        <th class="p-10">Coordinates</th>
                        <th class="p-10">Timestamp</th>
                        <th class="p-10">Status</th>
                        <th class="p-10 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="historyTable" class="text-xs font-black uppercase tracking-widest">
                    <!-- Dynamically populated via JS -->
                </tbody>
            </table>
        </div>
        
        <div class="px-12 pb-12 pt-6 flex justify-between items-center text-[10px] text-white/20 font-black uppercase tracking-[0.5em]">
            <span>Total Signals Tracked: <span id="totalRecords" class="text-white">0</span></span>
            <span id="fetchStatus" class="text-[var(--accent-blue)] animate-pulse">Scanning Grid...</span>
        </div>
    </div>

    <script>
        let currentAlerts = [];

        // Security Check
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        async function fetchHistory() {
            const status = document.getElementById('fetchStatus');
            const tbody = document.getElementById('historyTable');
            status.textContent = "Connecting to Database...";
            
            try {
                // Initialize Supabase locally to avoid global timing issues
                const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
                
                if (typeof supabase === 'undefined') {
                    status.textContent = "Error: Supabase library not loaded.";
                    return;
                }

                const client = supabase.createClient(supabaseUrl, supabaseKey);
                
                status.textContent = "Fetching records...";
                
                // Add cache buster timestamp to ensure fresh data
                const cacheBuster = Date.now();
                let response = await client.from('alerts').select('*', { count: 'exact' });
                
                // Fallback to capitalized table name if empty or error
                if (response.error || !response.data || response.data.length === 0) {
                    const fallback = await client.from('Alerts').select('*');
                    if (!fallback.error && fallback.data && fallback.data.length > 0) {
                        response = fallback;
                    }
                }

                const { data: alerts, error } = response;

                if (error) {
                    status.textContent = "Error: " + error.message;
                    alert("Supabase Error!\nURL: " + supabaseUrl + "\nMessage: " + error.message);
                    return;
                }
                
                status.textContent = "Sync Complete";
                currentAlerts = alerts || [];
                document.getElementById('totalRecords').textContent = currentAlerts.length;
                
                if (!alerts || alerts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-[var(--text-muted)]">No records found. <br><br> 1. Check if RLS SELECT policy is enabled. <br> 2. Ensure table name is exactly "alerts".</td></tr>';
                    return;
                }

                // Debug: Show first record in alert to confirm data arrival
                console.log("Data Received:", alerts);

                tbody.innerHTML = alerts.map(alert => {
                    const isResolved = alert.status === 'RESOLVED';
                    const time = alert.created_at || alert.time || new Date().toISOString();
                    const dateObj = new Date(time);
                    
                    // Safe ID display
                    const displayId = alert.id ? alert.id.toString().slice(-4) : '####';
                    
                    const statusHtml = isResolved 
                        ? `<span class="glass-btn inline-flex items-center gap-3 px-6 py-3 text-[8px] font-black tracking-[0.3em] text-[var(--accent-green)] border-white/5">
                                <span class="w-2 h-2 rounded-full bg-[var(--accent-green)] shadow-[0_0_10px_rgba(57,255,20,0.5)]"></span> SECURED
                            </span>`
                        : `<span class="glass-btn inline-flex items-center gap-3 px-6 py-3 text-[8px] font-black tracking-[0.3em] text-[var(--accent-red)] border-white/5">
                                <span class="w-2 h-2 rounded-full bg-[var(--accent-red)] animate-ping shadow-[0_0_10px_rgba(255,59,59,1)]"></span> BROADCASTING
                            </span>`;

                    return `
                        <tr class="hover:bg-white/5 transition-all border-b border-white/5 group">
                            <td class="p-10 text-white/40 font-black tracking-[0.3em]">#LOG-${displayId}</td>
                            <td class="p-10 text-white">
                                <div class="flex items-center gap-6">
                                    <div class="w-14 h-14 glass-btn flex items-center justify-center text-[10px] text-white/30 font-black uppercase tracking-tighter group-hover:shadow-[0_0_15px_rgba(255,255,255,0.1)] transition-all">${(alert.name || 'U').substring(0, 2)}</div>
                                    <span class="tracking-widest uppercase font-black">${alert.name || 'Unknown Subject'}</span>
                                </div>
                            </td>
                            <td class="p-10 text-[9px] text-white/80 tracking-[0.3em] font-black">
                                <span class="text-white/20">LAT:</span> ${parseFloat(alert.latitude || 0).toFixed(4)} <br>
                                <span class="text-white/20 mt-3 block">LNG:</span> ${parseFloat(alert.longitude || 0).toFixed(4)}
                            </td>
                            <td class="p-10 text-white/80">
                                <p class="tracking-[0.2em]">${dateObj.toLocaleDateString()}</p>
                                <p class="text-[9px] text-white/30 tracking-[0.4em] mt-3 uppercase">${dateObj.toLocaleTimeString()}</p>
                            </td>
                            <td class="p-10">${statusHtml}</td>
                            <td class="p-10 text-right">
                                <button onclick="alert('System Decryption: ${alert.message || 'No data recorded'}')" class="w-14 h-14 glass-btn inline-flex items-center justify-center text-[var(--accent-blue)] hover:shadow-[0_0_20px_rgba(0,210,255,0.4)] transition-all"><i class="fa-solid fa-shield-halved text-xl"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                status.textContent = "Critical Error";
                alert("Critical System Error: " + err.message);
            }
        }

        function exportToCSV() {
            if (currentAlerts.length === 0) {
                alert("No data available to export.");
                return;
            }

            const headers = ["ID", "Name", "Phone", "Latitude", "Longitude", "Message", "Status", "Timestamp"];
            const rows = currentAlerts.map(a => [
                a.id,
                `"${a.name || 'Unknown'}"`,
                a.phone || 'N/A',
                a.latitude,
                a.longitude,
                `"${(a.message || 'EMPTY').replace(/"/g, '""')}"`,
                a.status,
                a.created_at
            ]);

            let csvContent = headers.join(",") + "\n" 
                + rows.map(e => e.join(",")).join("\n");

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `SOS_History_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert(`✅ Exported ${rows.length} records successfully!`);
        }

        // Fetch on load
        fetchHistory();
    </script>
</body>
