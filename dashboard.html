<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Command Center | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-red: #ff3b3b;
            --accent-green: #39ff14;
            --accent-blue: #00d2ff;
            --neon-red: 0 0 15px rgba(255, 59, 59, 0.5);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background: #020617;
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 2rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-border);
            transform: translateY(-5px);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: var(--neon-red);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Map tint for high-tech mode */
        .map-tint { filter: invert(90%) hue-rotate(180deg) brightness(1.2) contrast(1.2); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-6 gap-6">
    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-red-600 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <!-- Header -->
    <header class="glass-panel p-8 flex justify-between items-center z-20">
        <div class="flex items-center gap-8">
            <div class="w-16 h-16 glass-btn flex items-center justify-center shadow-[0_0_20px_rgba(255,59,59,0.3)]">
                <i class="fa-solid fa-satellite-dish text-[var(--accent-red)] text-3xl animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-black text-4xl text-white tracking-tighter uppercase glow-text">COMMAND <span class="text-[var(--accent-red)]">HUB</span></h1>
                <p class="text-[10px] text-[var(--accent-green)] font-black tracking-[0.5em] uppercase mt-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-[var(--accent-green)] animate-ping"></span> Global Watch Active</p>
            </div>
        </div>
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-6 glass-panel px-10 py-5 border-white/5">
                <span class="text-[var(--accent-red)] font-black text-2xl tracking-tighter uppercase glow-text" id="activeAlertsCount">0 SIGNALS</span>
            </div>
            <a href="history.html" class="glass-btn px-10 py-5 text-[10px] font-black tracking-[0.3em] uppercase text-white hover:text-[var(--accent-blue)] flex items-center gap-4 transition-all"><i class="fa-solid fa-file-invoice-dollar"></i> ARCHIVES</a>
            <a href="index.html" class="w-16 h-16 glass-btn text-white/40 hover:text-[var(--accent-red)] flex items-center justify-center transition-all"><i class="fa-solid fa-power-off text-2xl"></i></a>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden gap-4">
        
        <!-- Sidebar Alerts -->
        <aside class="w-[500px] glass-panel flex flex-col z-20 overflow-hidden">
            <div class="p-10 flex justify-between items-center border-b border-white/5">
                <h2 class="font-black text-white tracking-tighter text-base uppercase glow-text">DISTRESS <span class="text-[var(--accent-red)]">SIGNALS</span></h2>
                <div class="w-2 h-2 rounded-full bg-[var(--accent-red)] animate-pulse shadow-[0_0_10px_rgba(255,59,59,1)]"></div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-10 space-y-10" id="alertsList">
                <div class="flex flex-col items-center justify-center h-full text-white/20 space-y-8">
                    <div class="w-28 h-28 glass-btn flex items-center justify-center border-white/5">
                        <i class="fa-solid fa-tower-broadcast animate-pulse text-5xl"></i>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.6em]">Awaiting Uplink</p>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <section class="flex-1 glass-panel relative overflow-hidden p-6 border-white/5">
            <iframe 
                width="100%" 
                height="100%" 
                frameborder="0" 
                style="border:0;" 
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14234!2d80.9461!3d26.8467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1" 
                allowfullscreen 
                class="map-tint rounded-[2rem]">
            </iframe>
            
            <!-- Overlay Info -->
            <div class="absolute top-12 right-12 glass-panel p-10 w-80 z-30 border-white/10 shadow-2xl">
                <div class="flex items-center gap-5 mb-8 pb-8 border-b border-white/5">
                    <div class="w-14 h-14 glass-btn flex items-center justify-center text-[var(--accent-red)]">
                        <i class="fa-solid fa-bullseye text-xl"></i>
                    </div>
                    <span class="text-white text-xs font-black tracking-widest uppercase">Grid Lock-on</span>
                </div>
                <div class="space-y-6 mb-10">
                    <div class="glass-btn p-5 border-white/5">
                        <span class="text-[8px] font-black text-white/30 uppercase tracking-[0.3em]">Latitude Index</span>
                        <span id="overlayLat" class="block text-base font-black text-white tracking-widest mt-2">---</span>
                    </div>
                    <div class="glass-btn p-5 border-white/5">
                        <span class="text-[8px] font-black text-white/30 uppercase tracking-[0.3em]">Longitude Index</span>
                        <span id="overlayLng" class="block text-base font-black text-white tracking-widest mt-2">---</span>
                    </div>
                </div>
                <div class="flex justify-between items-center text-[9px] font-black tracking-[0.4em] uppercase">
                    <span class="text-white/20">Secure Link</span>
                    <span class="text-[var(--accent-green)] animate-pulse">Established</span>
                </div>
            </div>
            
            <!-- Center Blinking Marker -->
            <div id="mapMarker" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center justify-center pointer-events-none hidden z-30">
                <span class="relative flex h-10 w-10">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[var(--accent-red)] opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-10 w-10 bg-[var(--accent-red)] border-4 border-white shadow-[0_0_20px_rgba(217,83,79,0.8)] flex items-center justify-center">
                      <i class="fa-solid fa-location-dot text-white text-sm"></i>
                  </span>
                </span>
                <div class="mt-3 bg-white/90 px-3 py-1 rounded-full text-[10px] font-extrabold text-[var(--accent-red)] tracking-widest shadow-lg uppercase animate-pulse border border-[var(--accent-red)]">
                    Target Location
                </div>
            </div>
            
        </section>

    </main>

    <script>
        // Security Check
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        // Initialize Supabase
        const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchAlerts() {
            try {
                const { data: alerts, error } = await supabaseClient
                    .from('alerts')
                    .select('*')
                    .eq('status', 'ACTIVE')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const alertsList = document.getElementById('alertsList');
                const countBadge = document.getElementById('activeAlertsCount');
                
                countBadge.textContent = `${alerts.length} ALERTS`;
                
                if (alerts.length > 0) {
                    alertsList.innerHTML = alerts.map(alert => {
                        const lat = alert.latitude;
                        const lng = alert.longitude;
                        const name = alert.name;
                        const time = alert.created_at;
                        return `
                        <div class="glass-card p-8 cursor-pointer w-full text-left relative overflow-hidden group border-white/5" onclick="updateMap(${lat}, ${lng})">
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <h3 class="font-black text-white text-2xl tracking-tighter uppercase glow-text">${name}</h3>
                                    <p class="text-[8px] text-white/30 font-black uppercase tracking-[0.5em] mt-2">Distress Beacon Active</p>
                                </div>
                                <span class="w-12 h-12 glass-btn flex items-center justify-center text-[var(--accent-red)] shadow-[0_0_15px_rgba(255,59,59,0.3)]">
                                    <i class="fa-solid fa-triangle-exclamation animate-bounce"></i>
                                </span>
                            </div>
                            
                            <div class="glass-btn p-5 space-y-4 mb-10 border-white/5">
                                <p class="text-[9px] text-white/60 font-black tracking-[0.2em] uppercase"><i class="fa-solid fa-clock-four mr-3 text-[var(--accent-blue)]"></i> ${new Date(time).toLocaleString()}</p>
                                <p class="text-[9px] text-white/60 font-black tracking-[0.2em] uppercase"><i class="fa-solid fa-phone-office mr-3 text-[var(--accent-green)]"></i> ${alert.phone || 'N/A'}</p>
                            </div>
                            
                            <div class="flex gap-6">
                                <button onclick="event.stopPropagation(); dispatchPolice(this)" class="flex-1 glass-btn text-[var(--accent-blue)] text-[9px] py-5 font-black uppercase tracking-[0.3em] hover:shadow-[0_0_20px_rgba(0,210,255,0.3)]"><i class="fa-solid fa-jet-fighter-up mr-3"></i> Dispatch</button>
                                <button onclick="event.stopPropagation(); resolveAlert(${alert.id})" class="flex-1 glass-btn text-white/40 hover:text-[var(--accent-green)] text-[9px] py-5 font-black uppercase tracking-[0.3em] transition-all"><i class="fa-solid fa-check-double mr-3"></i> Secure</button>
                            </div>
                        </div>
                    `;}).join('');
                    
                    // Auto-focus map on the newest alert
                    const firstAlert = alerts[0];
                    const firstLat = firstAlert.latitude || firstAlert.lat;
                    const firstLng = firstAlert.longitude || firstAlert.lng;
                    if (firstLat && firstLng) {
                        updateMap(firstLat, firstLng);
                    }
                } else {
                    alertsList.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-[var(--text-muted)]">
                            <div class="w-20 h-20 rounded-full neo-pressed flex items-center justify-center mb-6">
                                <i class="fa-solid fa-satellite animate-pulse text-3xl text-[var(--accent-green)]"></i>
                            </div>
                            <p class="text-xs font-bold uppercase tracking-widest text-[var(--accent-green)]">All Clear. Scanning...</p>
                        </div>
                    `;
                    // Reset map
                    document.getElementById('overlayLat').textContent = "---";
                    document.getElementById('overlayLng').textContent = "---";
                    document.getElementById('mapMarker').classList.add('hidden');
                    currentMapLat = null;
                    currentMapLng = null;
                }
            } catch (err) {
                console.error("Failed to fetch alerts");
            }
        }

        let currentMapLat = null;
        let currentMapLng = null;

        function updateMap(lat, lng) {
            const numLat = parseFloat(lat);
            const numLng = parseFloat(lng);
            if(isNaN(numLat) || isNaN(numLng)) return;
            
            document.getElementById('overlayLat').textContent = numLat.toFixed(4);
            document.getElementById('overlayLng').textContent = numLng.toFixed(4);
            
            // Show marker
            document.getElementById('mapMarker').classList.remove('hidden');

            // Prevent iframe flashing if coordinates are the same
            if(numLat === currentMapLat && numLng === currentMapLng) return;
            currentMapLat = numLat;
            currentMapLng = numLng;
            
            // Update iframe src dynamically
            const iframe = document.querySelector('iframe');
            iframe.src = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14234!2d${numLng}!3d${numLat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1`;
        }

        async function resolveAlert(id) {
            if(!confirm("Are you sure you want to mark this emergency as resolved?")) return;
            try {
                const { error } = await supabaseClient
                    .from('alerts')
                    .update({ status: 'RESOLVED', resolved_at: new Date().toISOString() })
                    .eq('id', id);
                
                if (error) throw error;
                fetchAlerts(); // Refresh the list instantly
            } catch (err) {
                console.error(err);
            }
        }

        function dispatchPolice(btn) {
            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Dispatched`;
            btn.style.color = 'var(--accent-green)';
            alert("🚓 Police unit has been dispatched to the exact coordinates!");
        }

        // Poll every 5 seconds
        setInterval(fetchAlerts, 5000);
        fetchAlerts();
    </script>
</body>
</html>
