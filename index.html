<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS | Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent-red: #ff3b3b;
            --accent-blue: #00d2ff;
            --accent-green: #39ff14;
            --neon-glow: 0 0 20px rgba(255, 59, 59, 0.8), 0 0 40px rgba(255, 59, 59, 0.4);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: var(--text-main); 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .sos-orb {
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at 30% 30%, #ff5f6d, #ff3b3b);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 10px 10px 20px rgba(255,255,255,0.4),
                inset -10px -10px 20px rgba(0,0,0,0.3),
                var(--neon-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: orb-pulse 2s infinite alternate;
        }
        
        @keyframes orb-pulse {
            from { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--neon-glow); }
            to { transform: scale(1.05); box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255, 59, 59, 1), 0 0 60px rgba(255, 59, 59, 0.6); }
        }

        .sos-orb:active {
            transform: scale(0.9);
            box-shadow: inset 10px 10px 30px rgba(0,0,0,0.6);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.2;
            animation: blob-float 15s infinite alternate ease-in-out;
        }
        .bg-blob-red {
            background: radial-gradient(circle, var(--accent-red) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 200px) scale(1.2); }
        }

        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-15px) rotateX(5deg); }
        }

        /* 3D hover effect */
        .card-3d {
            transition: transform 0.3s ease;
        }
        .card-3d:hover {
            transform: translateY(-10px) rotateY(2deg) rotateX(2deg);
        }

        /* Map tint for sober mode */
        .map-tint { filter: grayscale(0.5) contrast(1.1) brightness(1.05); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-20 overflow-x-hidden relative">
    <div class="bg-blob top-[10%] left-[-5%]"></div>
    <div class="bg-blob bg-blob-red bottom-[10%] right-[-5%]"></div>

    <!-- Navigation -->
    <nav class="w-full p-6 flex justify-between items-center z-50 sticky top-0 backdrop-blur-xl border-b border-white/10">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 glass-btn flex items-center justify-center text-[var(--accent-red)] shadow-[0_0_15px_rgba(255,59,59,0.3)]">
                <i class="fa-solid fa-shield-heart text-2xl"></i>
            </div>
            <span class="font-black text-2xl tracking-tighter text-white glow-text">KAVACH</span>
        </div>
        <div class="flex gap-6">
            <a href="ai-assistant.html" class="w-14 h-14 glass-btn flex items-center justify-center text-[var(--accent-blue)] hover:shadow-[0_0_20px_rgba(0,210,255,0.4)]">
                <i class="fa-solid fa-robot text-xl"></i>
            </a>
            <a href="login.html" class="w-14 h-14 glass-btn flex items-center justify-center text-[var(--accent-red)] hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
                <i class="fa-solid fa-user-shield text-xl"></i>
            </a>
        </div>
    </nav>

    <main class="w-full max-w-md px-6 flex flex-col items-center flex-1 z-10 mt-10">
        
        <div class="text-center mb-16 floating">
            <h1 class="text-6xl font-black mb-3 text-white uppercase tracking-tighter glow-text">Emergency <span class="text-[var(--accent-red)]">SOS</span></h1>
            <p class="text-white/60 text-[10px] font-black uppercase tracking-[0.5em]">Shield Activated • Secured Feed</p>
        </div>

        <!-- User Details Form -->
        <div class="w-full glass-card card-3d p-8 mb-16">
            <div class="flex items-center gap-3 mb-8 text-[10px] font-black text-white/70 uppercase tracking-widest">
                <i class="fa-solid fa-id-card text-[var(--accent-red)] text-sm shadow-sm"></i> Identity Verification
            </div>
            <div class="space-y-6">
                <input type="text" id="sosName" placeholder="ENTER FULL NAME" class="glass-input w-full px-6 py-5 text-sm font-bold tracking-widest uppercase placeholder-white/20">
                <input type="text" id="sosPhone" placeholder="VERIFIED CONTACT" class="glass-input w-full px-6 py-5 text-sm font-bold tracking-widest uppercase placeholder-white/20">
                <textarea id="sosMessage" placeholder="DESCRIBE EMERGENCY..." class="glass-input w-full px-6 py-5 text-sm font-bold h-28 resize-none tracking-widest uppercase placeholder-white/20"></textarea>
            </div>
        </div>

        <!-- Giant SOS Orb Button -->
        <div class="relative flex items-center justify-center mb-24">
            <div class="absolute w-[300px] h-[300px] bg-[var(--accent-red)]/10 rounded-full blur-[40px] animate-pulse"></div>
            <button id="sosBtn" class="sos-orb group">
                <i class="fa-solid fa-fingerprint mb-4 text-5xl opacity-80 group-hover:scale-110 transition-transform"></i>
                <span class="tracking-tighter">SOS</span>
                <div class="absolute -bottom-12 text-[10px] font-black tracking-[0.5em] text-white/40 uppercase">Hold to Activate</div>
            </button>
        </div>

        <!-- Status Box -->
        <div id="statusBox" class="w-full glass-card p-10 text-center hidden mb-16 animate-bounce">
            <i class="fa-solid fa-satellite-dish text-[var(--accent-blue)] animate-pulse mb-6 text-4xl shadow-[0_0_20px_rgba(0,210,255,0.5)]"></i>
            <p id="statusText" class="text-white font-black text-sm uppercase tracking-[0.3em]">Linking with Hub...</p>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-10 w-full mb-20">
            <a href="tel:112" class="glass-btn p-8 flex flex-col items-center gap-5 text-white hover:border-[var(--accent-red)] group">
                <div class="w-16 h-16 glass-btn flex items-center justify-center text-[var(--accent-red)] group-hover:shadow-[0_0_20px_rgba(255,59,59,0.5)] transition-all">
                    <i class="fa-solid fa-phone-flip text-2xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em]">Fast 112</span>
            </a>
            <button onclick="shareLocation()" class="glass-btn p-8 flex flex-col items-center gap-5 text-white hover:border-[var(--accent-blue)] group">
                <div class="w-16 h-16 glass-btn flex items-center justify-center text-[var(--accent-blue)] group-hover:shadow-[0_0_20px_rgba(0,210,255,0.5)] transition-all">
                    <i class="fa-solid fa-location-crosshairs text-2xl"></i>
                </div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em]">Live Feed</span>
            </button>
        </div>

        <!-- Trusted Contacts -->
        <div class="w-full glass-card card-3d p-10">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="font-black text-white uppercase text-lg tracking-tighter glow-text">The Vanguard</h2>
                    <p class="text-[9px] text-white/40 font-black uppercase tracking-[0.3em] mt-1">Direct Emergency Links</p>
                </div>
                <button onclick="addContact()" class="w-12 h-12 glass-btn text-[var(--accent-green)] hover:shadow-[0_0_15px_rgba(57,255,20,0.4)] transition-all"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="space-y-8" id="contactsList">
                <!-- Dynamically populated via JS -->
            </div>
        </div>
    </main>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://zhsgoytovsjpvtdbibbc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoc2dveXRvdnNqcHZ0ZGJpYmJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY0MjIsImV4cCI6MjA5MzUzMjQyMn0.jNlo2UQ6aC0UIPc0HxayYjDxWz9WGCvDttTK-AP-LWs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // SOS Button Logic
        document.getElementById('sosBtn').addEventListener('click', () => {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            
            const name = document.getElementById('sosName').value || 'Distressed User';
            const phone = document.getElementById('sosPhone').value || 'Unknown';
            const message = document.getElementById('sosMessage').value || '';
            
            statusBox.classList.remove('hidden');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    try {
                        const { data, error } = await supabaseClient
                            .from('alerts')
                            .insert([
                                { 
                                    name, 
                                    phone, 
                                    message, 
                                    latitude: position.coords.latitude, 
                                    longitude: position.coords.longitude,
                                    status: 'ACTIVE'
                                }
                            ]);

                        if (error) {
                            alert("SOS Dispatch Failed: " + error.message);
                            throw error;
                        }
                        
                        statusText.className = "text-[var(--accent-green)] font-bold uppercase tracking-widest text-xs mt-2";
                        statusText.textContent = "ALERT DISPATCHED TO COMMAND CENTER!";
                        statusBox.querySelector('i').className = "fa-solid fa-check-circle text-[var(--accent-green)] text-3xl";
                    } catch (error) {
                        console.error(error);
                        statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                        statusText.textContent = "NETWORK ERROR: COULD NOT DISPATCH ALERT.";
                        statusBox.querySelector('i').className = "fa-solid fa-triangle-exclamation text-[#e69b00] text-3xl";
                    }

                }, (error) => {
                    statusText.className = "text-[#e69b00] font-bold uppercase tracking-widest text-xs mt-2";
                    statusText.textContent = "GPS Failed. Make sure location is allowed.";
                    statusBox.querySelector('i').className = "fa-solid fa-exclamation-triangle text-[#e69b00] text-3xl";
                });
            } else {
                statusText.textContent = "Location services not available.";
            }
        });

        // Share Location Feature
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const text = encodeURIComponent(`🚨 EMERGENCY! I need help. My current location is: https://maps.google.com/?q=${lat},${lng}`);
                    window.open(`https://wa.me/?text=${text}`, '_blank');
                });
            } else {
                alert("Location services not supported!");
            }
        }

        // Trusted Contacts Logic (LocalStorage)
        let contacts = JSON.parse(localStorage.getItem('trustedContacts')) || [
            { name: "Mom", phone: "+919876543210" },
            { name: "Brother", phone: "+918765432109" }
        ];

        function renderContacts() {
            const list = document.getElementById('contactsList');
            list.innerHTML = contacts.map((c, index) => `
                <div class="flex justify-between items-center glass-btn p-6 border-white/5">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 glass-btn flex items-center justify-center text-white/30">
                            <i class="fa-solid fa-user-shield text-xl"></i>
                        </div>
                        <div>
                            <p class="font-black text-sm text-white uppercase tracking-tighter">${c.name}</p>
                            <p class="text-[9px] text-white/40 font-black tracking-[0.2em] mt-1 uppercase">${c.phone}</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <a href="tel:${c.phone}" class="w-12 h-12 flex items-center justify-center glass-btn text-[var(--accent-green)] hover:shadow-[0_0_15px_rgba(57,255,20,0.3)]"><i class="fa-solid fa-phone-flip"></i></a>
                        <button onclick="removeContact(${index})" class="w-12 h-12 flex items-center justify-center glass-btn text-[var(--accent-red)] hover:shadow-[0_0_15px_rgba(255,59,59,0.3)]"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addContact() {
            const name = prompt("Enter Contact Name:");
            if (!name) return;
            const phone = prompt("Enter Phone Number:");
            if (!phone) return;
            contacts.push({ name, phone });
            localStorage.setItem('trustedContacts', JSON.stringify(contacts));
            renderContacts();
        }

        function removeContact(index) {
            if(confirm("Remove this contact?")) {
                contacts.splice(index, 1);
                localStorage.setItem('trustedContacts', JSON.stringify(contacts));
                renderContacts();
            }
        }

        renderContacts();
    </script>
</body>
</html>
