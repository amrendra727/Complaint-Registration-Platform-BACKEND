<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Safety Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
                <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-red: #ff3b3b;
            --accent-blue: #00d2ff;
            --accent-green: #39ff14;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background: #020617;
            color: var(--text-main); 
            overflow: hidden; 
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            border-radius: 2.5rem;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }

        .ai-bubble {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border-bottom-left-radius: 0.5rem;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.1);
        }

        .user-bubble {
            background: rgba(255, 59, 59, 0.1);
            border: 1px solid rgba(255, 59, 59, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border-bottom-right-radius: 0.5rem;
            color: var(--accent-red);
            box-shadow: 0 5px 15px rgba(255, 59, 59, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 2rem;
            outline: none;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col max-w-md mx-auto relative glass-panel md:my-4 mb-10 overflow-hidden border-white/5">
    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none">
        <div class="absolute top-0 right-0 w-[300px] h-[300px] bg-blue-600 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-red-600 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header class="p-8 flex justify-between items-center z-20 border-b border-white/5 backdrop-blur-xl">
        <div class="flex items-center gap-8">
            <a href="index.html" class="w-14 h-14 glass-btn flex items-center justify-center text-white/50 hover:text-[var(--accent-red)] transition-all active:scale-90"><i class="fa-solid fa-chevron-left text-lg"></i></a>
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 glass-btn flex items-center justify-center shadow-[0_0_15px_rgba(0,210,255,0.2)]">
                    <i class="fa-solid fa-robot text-[var(--accent-blue)] text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tighter uppercase glow-text">GUARDIAN <span class="text-[var(--accent-blue)]">CORE</span></h1>
                    <p class="text-[9px] text-[var(--accent-green)] font-black tracking-[0.5em] uppercase mt-2">Active Monitor</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-6 space-y-6" id="chatBox">
        
        <!-- Welcome Message -->
        <div class="flex justify-start msg-anim">
            <div class="w-12 h-12 glass-btn flex items-center justify-center text-[var(--accent-blue)] mr-6 shrink-0 pointer-events-none mt-auto mb-4 border-white/5">
                <i class="fa-solid fa-microchip text-sm"></i>
            </div>
            <div class="ai-bubble max-w-[80%] p-8 text-sm font-black leading-relaxed tracking-widest uppercase">
                <p class="mb-5 font-black text-[var(--accent-blue)] text-[9px] tracking-[0.4em] uppercase opacity-50">Identity Verified</p>
                Greetings. Guardian Core is online. How can I assist you with your safety protocols?
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <footer class="p-8 z-20 backdrop-blur-2xl pb-14 md:pb-10 border-t border-white/5">
        <form id="chatForm" class="flex gap-5 relative">
            <input type="text" id="chatInput" class="flex-1 glass-input px-8 py-6 text-xs font-black tracking-[0.2em] uppercase placeholder-white/10" placeholder="Type protocols..." required autocomplete="off">
            <button type="submit" class="absolute right-3 top-3 bottom-3 w-14 glass-btn flex items-center justify-center text-[var(--accent-red)] active:scale-90 transition-all shadow-[0_0_15px_rgba(255,59,59,0.2)]">
                <i class="fa-solid fa-paper-plane-top text-lg"></i>
            </button>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatBox = document.getElementById('chatBox');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = chatInput.value.trim();
            if (!msg) return;

            appendMessage(msg, 'user');
            chatInput.value = '';

            const typingId = Date.now();
            appendTypingIndicator(typingId);

            try {
                // Mock AI response for GitHub Pages (Serverless)
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                let reply = "I'm analyzing your situation. If you are in immediate danger, please use the SOS button on the home page or dial 112.";
                
                if (msg.toLowerCase().includes('help')) {
                    reply = "Stay calm. If you are being followed, head towards a crowded area or a police station. Keep your phone in hand.";
                } else if (msg.toLowerCase().includes('home') || msg.toLowerCase().includes('cab')) {
                    reply = "Share your live location with a trusted contact immediately. You can do this from the 'Trusted Contacts' section on the main page.";
                }

                document.getElementById(`msg-${typingId}`).remove();
                appendMessage(reply, 'ai');
            } catch (error) {
                document.getElementById(`msg-${typingId}`).remove();
                appendMessage("CONNECTION LOST. If you are in danger, dial emergency services immediately.", 'ai');
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
            
            let html = '';
            
            if(sender === 'ai') {
                html += `
                    <div class="w-12 h-12 glass-btn flex items-center justify-center text-[var(--accent-blue)] mr-6 shrink-0 pointer-events-none mt-auto mb-4 border-white/5">
                        <i class="fa-solid fa-microchip text-sm"></i>
                    </div>
                    <div class="ai-bubble max-w-[80%] p-8 text-sm font-black leading-relaxed tracking-widest uppercase">
                        ${text}
                    </div>
                `;
            } else {
                html += `
                    <div class="user-bubble max-w-[80%] p-8 text-sm font-black leading-relaxed tracking-widest uppercase">
                        ${text}
                    </div>
                    <div class="w-12 h-12 glass-btn flex items-center justify-center text-white/30 ml-6 shrink-0 pointer-events-none mt-auto mb-4 border-white/5">
                        <i class="fa-solid fa-fingerprint text-sm"></i>
                    </div>
                `;
            }
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendTypingIndicator(id) {
            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `flex justify-start msg-anim`;
            
            div.innerHTML = `
                <div class="w-12 h-12 glass-btn flex items-center justify-center text-[var(--accent-blue)] mr-6 shrink-0 pointer-events-none mt-auto mb-4 border-white/5">
                    <i class="fa-solid fa-microchip text-sm"></i>
                </div>
                <div class="ai-bubble p-8 flex items-center justify-center">
                    <div class="dot-flashing"></div>
                </div>
            `;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
